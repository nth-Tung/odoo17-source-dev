services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_password
    ports:
      - "5432:5432"  
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always

  web:
    # Vẫn dùng image odoo để mượn môi trường Python/thư viện sẵn có, 
    # nhưng ta sẽ ghi đè lệnh chạy và mount mã nguồn bên ngoài vào.
    image: odoo:17.0
    ports:
      - "8069:8069"
    depends_on:
      - db
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./custom_addons:/mnt/extra-addons
      - ./odoo17:/mnt/odoo-source
    # Chạy trực tiếp bằng file odoo-bin từ source code chúng ta mount vào
    command: python3 /mnt/odoo-source/odoo-bin -c /etc/odoo/odoo.conf
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_password
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data: